<!DOCTYPE html><html class="light" lang="es"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Chat - Farmacia Guadalupe</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;family=Manrope:wght@400;500;600&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "background": "#f4faff",
              "on-secondary-fixed": "#0f1d25",
              "error": "#ba1a1a",
              "tertiary-container": "#008565",
              "surface-container": "#ddf1fd",
              "outline-variant": "#bccac1",
              "inverse-primary": "#68dbae",
              "error-container": "#ffdad6",
              "surface-variant": "#d2e5f1",
              "on-tertiary-container": "#f5fff8",
              "on-primary-fixed-variant": "#00513a",
              "inverse-on-surface": "#e1f4ff",
              "primary": "#00694c",
              "surface-container-highest": "#d2e5f1",
              "on-tertiary": "#ffffff",
              "on-surface-variant": "#3d4943",
              "tertiary-fixed": "#8af7cf",
              "secondary-fixed-dim": "#bac9d3",
              "primary-container": "#008560",
              "outline": "#6d7a73",
              "surface-tint": "#006c4e",
              "surface-container-high": "#d7ebf7",
              "on-tertiary-fixed-variant": "#00513d",
              "on-tertiary-fixed": "#002117",
              "surface": "#f4faff",
              "secondary-container": "#d5e5ef",
              "surface-bright": "#f4faff",
              "primary-fixed-dim": "#68dbae",
              "primary-fixed": "#86f8c9",
              "secondary-fixed": "#d5e5ef",
              "on-primary-fixed": "#002115",
              "on-surface": "#0b1e26",
              "on-secondary-fixed-variant": "#3b4951",
              "secondary": "#526069",
              "tertiary-fixed-dim": "#6edab4",
              "on-background": "#0b1e26",
              "surface-container-lowest": "#ffffff",
              "surface-container-low": "#e7f6ff",
              "on-error-container": "#93000a",
              "tertiary": "#00694f",
              "surface-dim": "#c9dde9",
              "on-primary-container": "#f5fff7",
              "on-secondary": "#ffffff",
              "inverse-surface": "#21333c",
              "on-primary": "#ffffff",
              "on-secondary-container": "#586670",
              "on-error": "#ffffff"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center px-4 py-3 justify-between bg-surface/80 backdrop-blur-md">
<div class="flex items-center gap-3">
<button class="p-2 hover:bg-surface-container-low transition-colors rounded-full text-primary" style="">
<span class="material-symbols-outlined" data-icon="arrow_back" style="">arrow_back</span>
</button>
<div class="flex items-center gap-2">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-white font-bold" style="">
                    FG
                </div>
<div>
<h1 class="font-headline font-bold text-lg tracking-tight leading-tight text-on-surface" style="">Farmacia Guadalupe</h1>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-sm text-primary" data-icon="verified" style="font-variation-settings: &quot;FILL&quot; 1;">verified</span>
<span class="text-[10px] font-bold text-primary tracking-widest uppercase" style="">Verificado</span>
</div>
</div>
</div>
</div>
<button class="p-2 hover:bg-surface-container-low transition-colors rounded-full text-primary" style="">
<span class="material-symbols-outlined" data-icon="more_vert" style="">more_vert</span>
</button>
</header>
<!-- Content Area -->
<main class="flex-1 mt-[72px] mb-24 px-4 max-w-2xl mx-auto w-full flex flex-col">
<!-- Status Banner -->
<div class="my-4 p-4 rounded-xl bg-primary-container/10 border border-primary/10 flex items-center gap-3">
<div class="bg-primary text-white rounded-full p-1 flex items-center justify-center">
<span class="material-symbols-outlined text-sm" data-icon="check" style="">check</span>
</div>
<p class="text-sm font-semibold text-primary" style="">✓ Oferta aceptada · Saldo bloqueado</p>
</div>
<!-- Date Separator -->
<div class="flex justify-center my-6">
<span class="text-[11px] font-bold text-outline uppercase tracking-widest bg-surface-container-low px-3 py-1 rounded-full" style="">Hoy</span>
</div>
<!-- Messages Loop -->
<div class="flex flex-col gap-6">
<!-- Agent Message -->
<div class="flex flex-col items-start max-w-[85%]">
<div class="bg-surface-container-low text-on-surface p-4 rounded-t-2xl rounded-br-2xl rounded-bl-none shadow-sm">
<p class="text-sm leading-relaxed" style="">Buen día recibimos su solicitud.</p>
</div>
<span class="text-[10px] mt-1 text-outline font-medium px-1" style="">09:41 AM</span>
</div>
<!-- User Message -->
<div class="flex flex-col items-end self-end max-w-[85%]">
<div class="bg-primary text-on-primary p-4 rounded-t-2xl rounded-bl-2xl rounded-br-none shadow-md">
<p class="text-sm leading-relaxed" style="">Hola! Estoy aqui alado llego en un momento.</p>
</div>
<div class="flex items-center gap-1 mt-1 px-1">
<span class="text-[10px] text-outline font-medium" style="">09:43 AM</span>
<span class="material-symbols-outlined text-[12px] text-primary" data-icon="done_all" style="">done_all</span>
</div>
</div>
<!-- Agent Message -->
<div class="flex flex-col items-start max-w-[85%]">
<div class="bg-surface-container-low text-on-surface p-4 rounded-t-2xl rounded-br-2xl rounded-bl-none shadow-sm">
<p class="text-sm leading-relaxed" style=""><span style="background-color: rgb(231, 246, 255);">Estamos en Av. Juárez 34, a un costado del banco.</span></p>
</div>
<span class="text-[10px] mt-1 text-outline font-medium px-1" style="">09:44 AM</span>
</div>
<!-- Quick Actions Section -->
<div class="grid grid-cols-1 gap-3 mt-4">
<button class="flex items-center justify-center gap-3 w-full h-[46px] rounded-lg bg-surface-container-highest text-primary font-semibold hover:bg-surface-variant transition-colors group" style="">
<span class="material-symbols-outlined group-hover:scale-110 transition-transform" data-icon="location_on" style="">location_on</span>
<span class="font-body text-sm" style="">Compartir ubicación</span>
</button>
<button class="flex items-center justify-center gap-3 w-full h-[46px] rounded-lg bg-primary text-white font-semibold hover:opacity-90 transition-opacity shadow-lg shadow-primary/20" style="">
<span class="material-symbols-outlined" data-icon="qr_code_2" style="">qr_code_2</span>
<span class="font-body text-sm" style="">Ver mi QR de intercambio</span>
</button>
</div>
</div>
</main>
<!-- Bottom Chat Input (Replacing BottomNavBar for focused task) -->
<div class="fixed bottom-0 w-full bg-surface/80 backdrop-blur-xl px-4 pt-3 pb-8 border-t border-surface-container">
<div class="max-w-2xl mx-auto flex items-end gap-3">
<button class="p-3 text-primary hover:bg-surface-container-low rounded-full transition-colors mb-0.5" style="">
<span class="material-symbols-outlined" data-icon="add_circle" style="">add_circle</span>
</button>
<div class="flex-1 relative flex items-center">
<textarea class="w-full bg-surface-container-low border-none focus:ring-2 focus:ring-primary rounded-2xl py-3 px-4 pr-12 text-sm text-on-surface placeholder:text-outline hide-scrollbar resize-none" placeholder="Escribe un mensaje..." rows="1"></textarea>
<button class="absolute right-2 p-2 text-primary" style="">
<span class="material-symbols-outlined" data-icon="mood" style="">mood</span>
</button>
</div>
<button class="w-11 h-11 bg-primary text-white rounded-full flex items-center justify-center shadow-lg hover:scale-105 active:scale-95 transition-all mb-0.5" style="">
<span class="material-symbols-outlined" data-icon="send" style="font-variation-settings: &quot;FILL&quot; 1;">send</span>
</button>
</div>
</div>
</body></html>
